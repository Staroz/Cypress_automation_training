name: Cypress Tests using Cypress Docker Image

on: push

jobs:
  test_Cypress:
    runs-on: ubuntu-22.04
    container: cypress/included:cypress-12.16.0-node-18.16.0-chrome-114.0.5735.133-1-ff-114.0.2-edge-114.0.1823.51-1
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Recover the secret
        run: |
            echo '${{ secrets.CREDENTIALS_E2E }}' > cypress/fixtures/credentials1.json
      # Install npm dependencies, cache them correctly
      # and run all Cypress tests
      - name: Cypress run
        uses: cypress-io/github-action@v5
        with:
          browser: chrome
      - name: Upload Cypress report
        uses: actions/upload-artifact@v2
        if: always()
        with:
          name: cypress-report
          path: cypress/reports
          retention-days: 7

  test_Playwright:
    needs: test_Cypress
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright:v1.35.0-jammy
    steps:
    - uses: actions/checkout@v3
    - name: Recover the secret
      run: |
          echo '${{ secrets.CREDENTIALS_E2E }}' > cypress/fixtures/credentials1.json
    - uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: npm ci
    - name: Install allure-commandline
      run: npm install -g allure-commandline --save-dev
    - name: Run Playwright tests
      run: npx playwright test --reporter=line,allure-playwright
    - name: Generate Allure report
      run: npx allure generate allure-results --clean -o allure-report
      if: always()
    - name: Uploading artifacts
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: allure-report
        path: allure-report
        retention-days: 7